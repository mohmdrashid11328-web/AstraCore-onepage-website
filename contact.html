<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AstraCore</title>
     <style>

        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: black;
            color:white;
        }

        .contact-form-section{
            min-height:100vh;
            padding:140px 10% 80px;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        
        .form-container{
            max-width:800px;
            width:100%;
        }

        .form-container h2{
            font-size:48px;
            color:white;
            margin-bottom:40px;
        }

        .form-container h2 span{
            color:#7ec8e3;
        }

        .form-container form{
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .form-container input,
        .form-container textarea{
            width:100%;
            padding:18px;
            border:1px solid rgba(255,255,255,0.15);
            background:rgba(255,255,255,0.05);
            color:white;
            border-radius:12px;
            font-size:15px;
            outline:none;
        }

        .form-container textarea{
            min-height:180px;
            resize:vertical;
        }

        .form-container button{
            padding:18px;
            border:none;
            border-radius:50px;
            background:#7ec8e3;
            color:#081018;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        .form-container button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(126,200,227,0.4);
        }

        /* BACK BUTTON */
        .back-btn{
            position:fixed;
            top:25px;
            left:60px;
            text-decoration:none;
            color:white;
            padding:10px 18px;
            border:1px solid rgba(255,255,255,0.2);
            border-radius:30px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(10px);
            transition:0.3s;
        }

        .back-btn:hover{
            background:#7ec8e3;
            color:#081018;
        }

     /* back to home button */
    .contact-header{
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
}

/* BUTTON STYLE */
.back-home-btn{
    display: inline-flex;
    align-items: center;
    gap: 8px;

    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;

    color: white;
    text-decoration: none;

    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 30px;

    backdrop-filter: blur(10px);

    transition: all 0.3s ease;
}

/* HOVER EFFECT */
.back-home-btn:hover{
    background: #7ec8e3;
    color: #081018;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(126, 200, 227, 0.3);
}

        /* MOBILE */
        @media (max-width:768px){

            .form-container h2{
                font-size:32px;
            }

            .back-btn{
                left:20px;
                top:15px;
            }
        }
        

    </style>
</head>

<body>
    <header class="contact-header">
    <a href="index.html" class="back-home-btn">
        ← BACK TO HOME
    </a>
</header>

<section id="contact-form" class="contact-form-section">

    <div class="form-container">

        <p class="small-title">GET IN TOUCH</p>

        <h2>
            Let's Build Something
            <span>Together</span>
        </h2>
     <!-- form -->
        <form id="contactForm" novalidate>

    <form id="contactForm">

    <div class="input-box">
         <label>Your Name</label>
        <input type="text" name="name" required>
    </div>

    <div class="input-box">
        <label>Email Address</label>
        <input type="email" name="email" required>
    </div>

    <div class="input-box">
         <label>Company Name</label>
        <input type="text" name="company">
    </div>

    <div class="input-box">
        <label>Your Message</label>
        <textarea name="message" required></textarea>
    </div>

    <button type="submit">SEND MESSAGE</button>

</form>
    </div>

</section>


<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const name = form.name.value.trim();
    const email = form.email.value.trim();
    const message = form.message.value.trim();

    if(name === ""){
        alert("⚠ Please enter your name");
        return;
    }

    if(email === ""){
        alert("⚠ Please enter your email");
        return;
    }

    if(!email.includes("@")){
        alert("⚠ Please enter a valid email");
        return;
    }

    if(message === ""){
        alert("⚠ Please enter your message");
        return;
    }

    alert("✅ Form submitted successfully!");
    form.reset();
});
</script>
</body>
</html>
